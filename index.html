<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>【畢業季活動】</title>

  <style>
    body {
      font-family: system-ui, -apple-system, "Noto Sans TC", Arial;
      margin: 24px;
      background-image:
        linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.15)),
        url("assets/background.jpg");
      background-size: cover;
      background-position: center top;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 22px;
      color: #ffffff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    .meta,
    #status {
      color: #ffffff;
      font-size: 13px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      margin-top: 230px;
    }

    .error {
      color: #b00020;
      margin-top: 12px;
      white-space: pre-wrap;
    }

    :root {
      --ema-wood-1: #f4d7ad;
      --ema-wood-2: #e7bf86;
      --ema-border: #c79a5b;
      --ema-ink: #2f2318;
    }

    .ema {
      position: relative;
      padding: 18px 16px 14px 16px;
      height: 220px;           /* ✅ 固定高度 */
      overflow: hidden;        /* ✅ 超出隱藏 */
      border: 1px solid var(--ema-border);
      border-radius: 14px;
      color: var(--ema-ink);

      background:
        radial-gradient(120px 80px at 20% 30%, rgba(255,255,255,0.20), rgba(255,255,255,0.00) 60%),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.10) 0px,
          rgba(255,255,255,0.10) 7px,
          rgba(0,0,0,0.03) 11px,
          rgba(0,0,0,0.03) 18px
        ),
        linear-gradient(180deg, var(--ema-wood-1), var(--ema-wood-2));

      box-shadow:
        0 10px 18px rgba(0,0,0,0.20),
        0 2px 6px rgba(0,0,0,0.12);

      clip-path: polygon(
        12% 0%,
        88% 0%,
        100% 16%,
        100% 100%,
        0% 100%,
        0% 16%
      );
    }

    /* 關掉上方圖樣 */
    .ema::before,
    .ema::after {
      display: none !important;
      content: none !important;
    }

    /* 右下角熊圖 */
    .ema .stamp {
      position: absolute;
      right: 6px;
      bottom: 6px;
      width: 100px;
      height: 100px;
      object-fit: contain;
      pointer-events: none;
      transform: rotate(-8deg);
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.35));
    }

    .ema .name {
      font-weight: 700;
      margin: 10px 0 8px 0;
    }

    .ema .msg {
      margin: 0;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
    }

    @media (max-width: 768px) {
      .grid {
        margin-top: 80px;
      }

      .ema {
        height: 200px;
      }

      .ema .stamp {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>【畢業季活動】</h1>
      <div class="meta">每 5 秒更新一次，顯示最新 100 則</div>
    </div>
    <div class="meta" id="status">初始化…</div>
  </header>

  <div id="error" class="error" style="display:none;"></div>
  <section id="grid" class="grid"></section>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz8EGQ_S_EEq7xgr8nlmKulP2Q68xeO4aP4vaz0tJ6L1ENIpYwtp_I-jgIPCgpvbS2QLA/exec";
    const REFRESH_MS = 5000;

    const grid = document.getElementById('grid');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');

    function render(items) {
      grid.innerHTML = '';

      for (const it of items) {
        const card = document.createElement('div');
        card.className = 'ema';

        const nameEl = document.createElement('div');
        nameEl.className = 'name';
        nameEl.textContent = it.nickname ? it.nickname : '匿名';

        let msg = it.message || '';
        if (msg.length > 50) {
          msg = msg.slice(0, 100) + '…';
        }

        const msgEl = document.createElement('p');
        msgEl.className = 'msg';
        msgEl.textContent = msg;

        const stampEl = document.createElement('img');
        stampEl.className = 'stamp';
        stampEl.src = 'assets/bear.png';
        stampEl.alt = 'bear';

        card.appendChild(nameEl);
        card.appendChild(msgEl);
        card.appendChild(stampEl);

        grid.appendChild(card);
      }
    }

    async function refresh() {
      try {
        statusEl.textContent = '更新中…';
        errorEl.style.display = 'none';

        const res = await fetch(`${API_URL}?t=${Date.now()}`, {
          method: "GET",
          cache: "no-store"
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'API error');

        render(data.items || []);
        statusEl.textContent = `最後更新：${new Date().toLocaleTimeString('zh-TW', { hour12: false })}`;
      } catch (err) {
        errorEl.style.display = 'block';
        errorEl.textContent = '載入失敗：\n' + String(err);
        statusEl.textContent = '更新失敗';
      }
    }

    refresh();
    setInterval(refresh, REFRESH_MS);
  </script>
</body>
</html>
